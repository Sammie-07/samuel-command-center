<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Samuel — Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0C0C0E;--surface:#141416;--surface2:#1C1C20;--border:#242428;
  --text:#F0EFEA;--muted:#6B6A72;--dim:#3A3940;
  --god:#1D9E75;--ai:#378ADD;--academic:#D4537E;--youtube:#EF9F27;
  --self:#639922;--job:#888780;--morning:#7F77DD;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;line-height:1.5;overscroll-behavior:none}
.app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.hdr{padding:1.1rem 1rem 0.7rem;border-bottom:1px solid var(--border);flex-shrink:0;position:sticky;top:0;background:var(--bg);z-index:10}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.65rem}
.hdr-name{font-family:'Syne',sans-serif;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase}
.hdr-day{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text);line-height:1}
.hdr-date{font-size:10px;color:var(--muted);margin-top:1px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--god);animation:blink 2s infinite;margin-top:4px;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.pbar-wrap{display:flex;align-items:center;gap:8px}
.pbar-track{flex:1;height:2px;background:var(--dim);border-radius:1px}
.pbar-fill{height:100%;border-radius:1px;background:var(--text);transition:width 0.35s ease}
.pbar-pct{font-size:10px;color:var(--muted);min-width:28px;text-align:right}

/* NAV */
.nav{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;flex-shrink:0;position:sticky;top:72px;background:var(--bg);z-index:9}
.nav::-webkit-scrollbar{display:none}
.nav-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;padding:10px 13px;cursor:pointer;white-space:nowrap;letter-spacing:0.04em;transition:all 0.15s;flex-shrink:0}
.nav-btn.active{color:var(--text);border-bottom-color:var(--text)}
.nav-btn:hover:not(.active){color:#bbb}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding-bottom:2rem}

/* DAY TABS */
.days{display:flex;gap:4px;padding:0.7rem 1rem;overflow-x:auto;scrollbar-width:none}
.days::-webkit-scrollbar{display:none}
.day-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;padding:5px 9px;cursor:pointer;white-space:nowrap;transition:all 0.15s;letter-spacing:0.05em;flex-shrink:0}
.day-btn.active{background:var(--text);color:var(--bg);border-color:var(--text);font-weight:500}

/* SCHEDULE BLOCKS */
.block{display:flex;gap:8px;padding:0.5rem 1rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;align-items:flex-start;user-select:none}
.block:active{background:var(--surface2)}
.block.done .b-title{text-decoration:line-through;opacity:0.35}
.block.done .b-sub{opacity:0.25}
.b-time{min-width:60px;font-size:10px;color:var(--muted);padding-top:2px;line-height:1.4;flex-shrink:0}
.b-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.b-info{flex:1;min-width:0}
.b-title{font-size:13px;color:var(--text);font-weight:500;line-height:1.35}
.b-sub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.5}
.b-tag{display:inline-block;font-size:9px;padding:2px 7px;border-radius:2px;margin-top:4px;letter-spacing:0.06em;text-transform:uppercase}
.chk{width:18px;height:18px;border-radius:3px;border:1px solid var(--dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all 0.15s}
.chk.done{background:var(--text);border-color:var(--text)}
.chk svg{opacity:0;transition:opacity 0.1s}
.chk.done svg{opacity:1}

/* CARDS */
.banner{margin:0.7rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.7rem 1rem}
.banner-lbl{font-size:9px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px}
.banner p{font-size:12px;color:#aaa;line-height:1.6}
.tip{margin:0.7rem 1rem;background:#0A1E30;border:1px solid #1A3050;border-radius:6px;padding:0.7rem 1rem}
.tip-yt{background:#1A1200;border-color:#2A2000}
.tip-lbl{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.tip p{font-size:12px;color:#aaa;line-height:1.6;margin-bottom:8px}
.tip-btn{display:block;width:100%;background:none;border:1px solid #1A3050;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px;padding:7px 10px;cursor:pointer;text-align:left;color:#378ADD;transition:background 0.15s}
.tip-btn:active{background:#0A2540}
.tip-yt .tip-btn{border-color:#2A2000;color:#EF9F27}
.tip-yt .tip-btn:active{background:#221800}

/* PHASE TABS */
.phase-tabs{display:flex;gap:4px;padding:0.7rem 1rem;overflow-x:auto;scrollbar-width:none}
.phase-tabs::-webkit-scrollbar{display:none}
.phase-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;padding:5px 9px;cursor:pointer;white-space:nowrap;transition:all 0.15s;letter-spacing:0.04em;flex-shrink:0}
.phase-btn.yt-active{background:var(--youtube);color:#0C0C0E;border-color:var(--youtube);font-weight:500}
.phase-btn.ai-active{font-weight:500}

/* TASK ITEMS */
.tl-item{padding:0.7rem 1rem;border-bottom:1px solid var(--border)}
.tl-month{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.tl-task{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;cursor:pointer;user-select:none}
.tl-task:last-child{margin-bottom:0}
.tl-chk{width:14px;height:14px;border-radius:2px;border:1px solid var(--dim);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.tl-title{font-size:12px;color:var(--text);line-height:1.4;flex:1}
.tl-title.done{text-decoration:line-through;opacity:0.35}
.tl-detail{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.5}
.badge{font-size:9px;padding:2px 6px;border-radius:2px;margin-left:5px;text-transform:uppercase;letter-spacing:0.05em;display:inline-block;vertical-align:middle}
.p-crit{background:#2A0808;color:#E24B4A}
.p-high{background:#2A1A05;color:#EF9F27}
.p-med{background:#0A1E30;color:#378ADD}

/* PHASE CARD */
.phase-card{margin:0 1rem 0.7rem;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--youtube);border-radius:6px;overflow:hidden}
.phase-hdr{padding:0.6rem 1rem;border-bottom:1px solid var(--border)}
.phase-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
.phase-sub{font-size:11px;color:var(--muted);margin-top:1px}
.phase-goal{font-size:11px;color:var(--youtube);padding:0.45rem 1rem;border-bottom:1px solid var(--border)}
.yt-task{display:flex;gap:8px;padding:0.5rem 1rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;align-items:flex-start;user-select:none}
.yt-task:last-child{border-bottom:none}
.yt-task:active{background:var(--surface2)}
.yt-day{font-size:9px;color:var(--dim);min-width:54px;padding-top:2px;letter-spacing:0.03em;line-height:1.4;flex-shrink:0}
.yt-info{flex:1}
.yt-title{font-size:12px;color:var(--text);line-height:1.35}
.yt-title.done{text-decoration:line-through;opacity:0.35}
.yt-detail{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.5}
.yt-dlv{font-size:10px;color:var(--youtube);margin-top:3px;line-height:1.4}

/* CHANNELS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0.7rem 1rem}
.ch-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.6rem 0.7rem}
.ch-name{font-size:11px;color:var(--text);font-weight:500;margin-bottom:2px}
.ch-niche{font-size:10px;color:var(--muted);line-height:1.4}

/* STATS */
.stats4{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0.7rem 1rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.6rem 0.7rem}
.stat-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:0.04em}

/* CODE */
.code{margin:0 1rem 0.7rem;background:#0A0A0C;border:1px solid var(--border);border-radius:6px;padding:0.7rem 1rem;font-size:10px;color:#7FB3D3;line-height:1.7;overflow-x:auto;white-space:pre-wrap}
.code .cm{color:var(--dim)}

/* SECTION HDR */
.shdr{padding:0.5rem 1rem 0.2rem;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}

/* METRIC ROW */
.mrow{display:flex;justify-content:space-between;align-items:center;padding:8px 1rem;border-bottom:1px solid var(--border)}
.mrow:last-child{border-bottom:none}
.mrow-lbl{font-size:11px;color:var(--muted)}
.mrow-val{font-size:12px;color:var(--text);font-weight:500}

/* PROGRAM ROW */
.prog{display:flex;gap:8px;padding:0.5rem 1rem;border-bottom:1px solid var(--border);align-items:flex-start}
.prog-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.prog-name{font-size:12px;color:var(--text);font-weight:500;line-height:1.35}
.prog-school{font-size:11px;color:var(--muted);margin-top:1px}

/* LEDGER */
.ldg-tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.ldg-tabs::-webkit-scrollbar{display:none}
.ldg-tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;padding:9px 13px;cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0}
.ldg-tab.active{color:var(--text);border-bottom-color:#EF9F27}
.ldg-section{padding:0.7rem 1rem}
.ldg-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.75rem 1rem;margin-bottom:0.5rem}
.ldg-card-title{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:0.4rem}
.ldg-status-ok{border-left:3px solid #1D9E75;background:#050F0A}
.ldg-status-warn{border-left:3px solid #E24B4A;background:#120505}
.ldg-grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:0.5rem}
.ldg-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:0.5rem}
.ldg-grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:0.5rem}
.ldg-mini{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:0.5rem 0.6rem;text-align:center}
.ldg-mini-lbl{font-size:9px;color:var(--muted);letter-spacing:0.05em;margin-bottom:3px}
.ldg-mini-val{font-size:13px;font-weight:600;line-height:1}
.ldg-bar-wrap{height:3px;background:var(--dim);border-radius:2px;overflow:hidden;margin:4px 0 2px}
.ldg-bar-fill{height:100%;border-radius:2px;transition:width 0.4s ease}
.ldg-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.ldg-row:last-child{border-bottom:none}
.ldg-row-lbl{font-size:11px;color:var(--muted)}
.ldg-row-val{font-size:12px;color:var(--text);font-weight:500}
.ldg-period{padding:0.55rem 1rem;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:background 0.1s}
.ldg-period:active{background:var(--surface2)}
.ldg-period-hdr{display:flex;align-items:center;gap:8px}
.ldg-period-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ldg-period-date{font-size:12px;color:var(--text);flex:1}
.ldg-period-note{font-size:10px;color:var(--muted);flex:1}
.ldg-period-amt{font-size:11px;color:var(--muted);text-align:right}
.ldg-period-detail{padding:0.5rem 0 0.25rem 1.5rem;display:none}
.ldg-period-detail.open{display:block}
.ldg-purchase{display:flex;gap:10px;padding:0.55rem 1rem;border-bottom:1px solid var(--border);cursor:pointer;align-items:flex-start;transition:background 0.1s}
.ldg-purchase:active{background:var(--surface2)}
.ldg-purchase.done{opacity:0.5}
.ldg-purchase-emoji{font-size:18px;flex-shrink:0;margin-top:1px}
.ldg-purchase-info{flex:1;min-width:0}
.ldg-purchase-name{font-size:12px;color:var(--text);line-height:1.35}
.ldg-purchase-name.done{text-decoration:line-through}
.ldg-purchase-sub{font-size:10px;color:var(--muted);margin-top:2px}
.ldg-purchase-amt{font-size:12px;color:#EF9F27;font-weight:600;flex-shrink:0}
.ldg-chk{width:16px;height:16px;border-radius:3px;border:1px solid var(--dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all 0.15s}
.ldg-chk.done{background:#EF9F27;border-color:#EF9F27}
.ldg-badge-ok{font-size:9px;padding:2px 6px;border-radius:2px;background:#051a10;color:#1D9E75;margin-left:5px;vertical-align:middle}
.ldg-badge-warn{font-size:9px;padding:2px 6px;border-radius:2px;background:#1a0505;color:#E24B4A;margin-left:5px;vertical-align:middle}
.ldg-btn{display:block;width:100%;background:none;border:1px solid var(--border);border-radius:4px;font-family:'DM Mono',monospace;font-size:11px;padding:8px 12px;cursor:pointer;text-align:left;color:#EF9F27;transition:background 0.15s;margin-top:0.4rem}
.ldg-btn:active{background:var(--surface2)}
.ldg-input{display:block;width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;font-family:'DM Mono',monospace;font-size:12px;padding:7px 10px;color:var(--text);outline:none;box-sizing:border-box}
.ldg-input:focus{border-color:#EF9F27}
.ldg-stacked-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;gap:1px;margin-bottom:6px}
</style>
</head>

  <div class="hdr">
    <div class="hdr-top">
      <div>
        <div class="hdr-name">Samuel Akinwande</div>
        <div class="hdr-day" id="hdr-day"></div>
        <div class="hdr-date" id="hdr-date"></div>
      </div>
      <div class="live-dot"></div>
    </div>
    <div class="pbar-wrap">
      <div class="pbar-track"><div class="pbar-fill" id="pbar" style="width:0%"></div></div>
      <div class="pbar-pct" id="pbar-pct">0%</div>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="sw('schedule',this)">Today</button>
    <button class="nav-btn" onclick="sw('youtube',this)">YouTube</button>
    <button class="nav-btn" onclick="sw('academia',this)">Academia</button>
    <button class="nav-btn" onclick="sw('ai',this)">AI Biz</button>
    <button class="nav-btn" onclick="sw('overview',this)">Overview</button>

  <div class="content">
    <div id="view-schedule"></div>
    <div id="view-youtube" style="display:none"></div>
    <div id="view-academia" style="display:none"></div>
    <div id="view-ai" style="display:none"></div>
    <div id="view-overview" style="display:none"></div>
    <div id="view-ledger" style="display:none"></div>
  </div>
</div>

const WED = [
  {t:'6:00',e:'6:15', cat:'morning',  title:'Wake — hydrate',                    sub:'Water first. No phone.'},
  {t:'6:15',e:'7:00', cat:'god',      title:'Word of God + Prayer',              sub:'Non-negotiable. Start anchored.'},

// ─── STATE (persisted) ───────────────────────────────────────────────────────

function load(k, def) {
  try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; }
  catch(e) { return def; }
}
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function getSched(d) {
  if (d === 3) return WED;
  if (d === 0 || d === 6) return WKD;
  return WD;
}

function chkSVG(color) {
  return `<svg width="9" height="7" viewBox="0 0 9 7" fill="none">
    <path d="M1 3.5L3.5 6L8 1" stroke="${color||'#0C0C0E'}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function dayTab(i) {
  return `<button class="day-btn ${i===currentDay?'active':''}" onclick="switchDay(${i})">${DAY_SHORT[i]}</button>`;
}

// ─── RENDER HEADER ───────────────────────────────────────────────────────────

function renderHdr() {
  const s = getSched(currentDay);
  const done = s.filter((_,i) => sChecked[currentDay+'_'+i]).length;
  const pct  = s.length ? Math.round(done/s.length*100) : 0;
  document.getElementById('pbar').style.width = pct+'%';
  document.getElementById('pbar-pct').textContent = pct+'%';
  document.getElementById('hdr-day').textContent  = DAY_NAMES[currentDay];
  document.getElementById('hdr-date').textContent = MONTHS[TODAY.getMonth()]+' '+TODAY.getDate()+', '+TODAY.getFullYear();
}

// ─── VIEW SWITCHER ───────────────────────────────────────────────────────────

function sw(v, btn) {
  currentView = v;
  ['schedule','youtube','academia','ai','overview','ledger'].forEach(x => {
    document.getElementById('view-'+x).style.display = x===v ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renders[v]();
}

// ─── SCHEDULE ────────────────────────────────────────────────────────────────

function renderSchedule() {
  renderHdr();
  const isWed = currentDay === 3;
  const isWkd = currentDay === 0 || currentDay === 6;
  const s = getSched(currentDay);
  let h = '';

  // Day tabs
  h += `<div class="days">${DAY_SHORT.map((_,i)=>dayTab(i)).join('')}</div>`;

  // Outside tip
  const tip = isWkd
    ? 'Weekend: deliberate outing blocked 5:30–7pm. Walk to a café, park, anywhere. Home isolation kills creative energy.'
    : isWed
    ? 'Wednesday is tighter. Get outside 8–9:30am for your AI block. Walk to a nearby spot.'
    : 'Get your 8–10am AI block outside. Café or park bench. Breaks the home-drain cycle before your 3pm job.';
  h += `<div class="banner" style="border-left:3px solid var(--muted)"><div class="banner-lbl">Go outside tip</div><p>${tip}</p></div>`;

  // Blocks
  s.forEach((b, i) => {
    const c = C[b.cat];
    const done = !!sChecked[currentDay+'_'+i];
    h += `<div class="block ${done?'done':''}" onclick="toggleSched(${i})">
      <div class="b-time">${b.t}<br>${b.e}</div>
      <div class="b-dot" style="background:${c.dot}"></div>
      <div class="b-info">
        <div class="b-title">${b.title}</div>
        <div class="b-sub">${b.sub}</div>
        <span class="b-tag" style="background:${c.tag};color:${c.tc}">${c.lbl}</span>
      </div>
      <div class="chk ${done?'done':''}">${chkSVG('#0C0C0E')}</div>
    </div>`;
  });

  // Tip
  const tips = {
    0:'Weekend = build time. Ship an automation, batch YouTube, or push academic work.',
    1:'Monday: run AI biz outreach. Open Claude and draft 20 LinkedIn messages.',
    2:'Tuesday: YouTube script day. Claude can outline a full faceless video in 5 minutes.',
    3:'Wednesday meeting day. Use Claude to prep talking points in 2 minutes.',
    4:'Thursday: AI build day. Use Claude Code for the current client\'s workflow.',
    5:'Friday: wrap the week. Push GitHub, send follow-ups, review masterplan progress.',
    6:'Sunday: weekly review. What moved forward? What didn\'t?',
  };
  h += `<div class="tip"><div class="tip-lbl" style="color:#378ADD">Claude — today</div><p>${tips[currentDay]}</p></div>`;

  document.getElementById('view-schedule').innerHTML = h;
}

  const k = currentDay+'_'+i;

  renderSchedule();
}

const LDG_KEY = 'ldg_v1';
function ldgLoad() { try { return JSON.parse(localStorage.getItem(LDG_KEY)||'null')||{paidPeriods:{},purchasesDone:{},balances:{savings:0,land:0,goal:0}}; } catch(e){return{paidPeriods:{},purchasesDone:{},balances:{savings:0,land:0,goal:0}};} }
function ldgSave(s) { try { localStorage.setItem(LDG_KEY,JSON.stringify(s)); } catch(e){} }

// ─── LEDGER HELPERS ───────────────────────────────────────────────────────────

function ldgFmt(n) { return '₦'+Number(n).toLocaleString('en-NG'); }
function ldgFmtK(n) {
  if(n>=1000000) return '₦'+(n/1000000).toFixed(1)+'M';
  if(n>=1000)    return '₦'+(n/1000).toFixed(0)+'k';
  return '₦'+n;
}
function ldgFmtDate(str) {
  return new Date(str).toLocaleDateString('en-NG',{month:'short',day:'numeric',year:'numeric'});
}
function ldgFmtShort(str) {
  return new Date(str).toLocaleDateString('en-NG',{month:'short',day:'numeric'});
}

// ─── LEDGER ACTIONS ───────────────────────────────────────────────────────────

function ldgMarkPaid(periodId) {
  const amt = Number(document.getElementById('ldg-pay-amt-'+periodId).value||INCOME.gross);
  const notes = (document.getElementById('ldg-pay-notes-'+periodId)||{}).value||'';
  ldgState.paidPeriods[periodId] = { actualAmount:amt, paidDate:new Date().toISOString(), notes };
  ldgSave(ldgState);
  ldgMarkOpen = null;
  renderLedger();
}

function ldgUnmarkPaid(periodId) {
  delete ldgState.paidPeriods[periodId];
  ldgSave(ldgState);
  renderLedger();
}

function ldgMarkDone(purchaseId) {
  const amt = Number(document.getElementById('ldg-buy-amt-'+purchaseId).value||0);
  ldgState.purchasesDone[purchaseId] = { doneDate:new Date().toISOString(), actualCost:amt };
  ldgSave(ldgState);
  ldgBuyOpen = null;
  renderLedger();
}

function ldgUnmarkDone(purchaseId) {

  ldgSave(ldgState);
  renderLedger();
}

// ─── LEDGER RENDER ────────────────────────────────────────────────────────────

function renderLedger() {
  const now = new Date();
  const pastPeriods   = PLAN_PERIODS.filter(p => new Date(p.date) <= now);
  const futurePeriods = PLAN_PERIODS.filter(p => new Date(p.date) > now);
  const nextPeriod    = futurePeriods[0] || null;
  const lastPast      = pastPeriods[pastPeriods.length-1] || null;
  const overdue       = pastPeriods.filter(p => !ldgState.paidPeriods[p.id]);
  const onTrack       = overdue.length === 0;
  const paidCount     = pastPeriods.filter(p => ldgState.paidPeriods[p.id]).length;
  const daysToNext    = nextPeriod ? Math.ceil((new Date(nextPeriod.date)-now)/86400000) : null;
  const planned       = lastPast ? {savings:lastPast.savings,land:lastPast.land,goal:lastPast.goal} : {savings:0,land:0,goal:0};

  let h = '';

  // Sub-tabs
  const tabs = ['overview','timeline','budget','purchases'];
  h += `<div class="ldg-tabs">`;
  tabs.forEach(t => {
    h += `<button class="ldg-tab ${t===ldgTab?'active':''}" onclick="ldgSwitchTab('${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`;
  });
  h += `</div>`;

  if (ldgTab === 'overview') h += ldgOverview(now, nextPeriod, lastPast, paidCount, pastPeriods, overdue, onTrack, planned, daysToNext);
  else if (ldgTab === 'timeline') h += ldgTimeline(now, pastPeriods, overdue, nextPeriod);
  else if (ldgTab === 'budget') h += ldgBudget();
  else if (ldgTab === 'purchases') h += ldgPurchases(now);

  document.getElementById('view-ledger').innerHTML = h;
}

    <div class="ldg-grid4">
      <div class="ldg-mini"><div class="ldg-mini-lbl">Gross</div><div class="ldg-mini-val">${ldgFmtK(INCOME.gross)}</div></div>
      <div class="ldg-mini"><div class="ldg-mini-lbl">Tithe</div><div class="ldg-mini-val" style="color:#E24B4A">-${ldgFmtK(INCOME.tithe)}</div></div>
      <div class="ldg-mini"><div class="ldg-mini-lbl">Upkeep</div><div class="ldg-mini-val" style="color:#f59e0b">-${ldgFmtK(INCOME.upkeep)}</div></div>
      <div class="ldg-mini"><div class="ldg-mini-lbl">Net</div><div class="ldg-mini-val" style="color:#1D9E75">${ldgFmtK(INCOME.net)}</div></div>
    </div>
  </div>`;

  // Fund balances
  h += `<div class="ldg-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
      <div class="ldg-card-title" style="margin-bottom:0">Fund Balances</div>
      <button onclick="ldgToggleBal()" style="background:none;border:none;color:#EF9F27;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer">${ldgEditBal?'Cancel':'Update actuals'}</button>
    </div>`;

  if (ldgEditBal) {
    h += `<div class="ldg-grid3" style="margin-bottom:8px">
      <div><div style="font-size:10px;color:var(--muted);margin-bottom:3px">Savings</div><input id="ldg-bal-savings" class="ldg-input" type="number" value="${bal.savings}"></div>
      <div><div style="font-size:10px;color:var(--muted);margin-bottom:3px">Land/Stocks</div><input id="ldg-bal-land" class="ldg-input" type="number" value="${bal.land}"></div>
      <div><div style="font-size:10px;color:var(--muted);margin-bottom:3px">Goal Fund</div><input id="ldg-bal-goal" class="ldg-input" type="number" value="${bal.goal}"></div>
    </div>
    <button onclick="ldgSaveBal()" style="display:block;width:100%;background:#EF9F27;border:none;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px;padding:8px;cursor:pointer;color:#0C0C0E;font-weight:700;margin-bottom:0.5rem">Save Balances</button>`;
  }

  fundCards.forEach(f => {
    const actual  = bal[f.key];
    const plan    = planned[f.key];
    const pct     = Math.min((actual/f.max)*100,100);
    const planPct = Math.min((plan/f.max)*100,100);
    const diff    = actual - plan;
    h += `<div style="margin-bottom:0.6rem">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
        <span style="color:var(--muted)">${f.label}</span>
        <span style="color:${f.color};font-weight:600">${ldgFmtK(actual)} <span style="color:var(--dim);font-weight:400">/ ${ldgFmtK(plan)} plan</span></span>
      </div>
      <div class="ldg-bar-wrap">
        <div style="width:${planPct}%;height:100%;background:${f.color};opacity:0.25;border-radius:2px;position:absolute"></div>
        <div class="ldg-bar-fill" style="width:${pct}%;background:${f.color}"></div>
      </div>
      ${plan>0 ? `<div style="font-size:10px;color:${diff>=0?'#1D9E75':'#E24B4A'}">${diff>=0?'+'+ldgFmtK(diff)+' ahead':ldgFmtK(diff)+' behind'}</div>` : ''}
    </div>`;
  });

  h += `<div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:0.5rem;margin-top:0.25rem">
    <div><div style="font-size:10px;color:var(--muted)">Total Portfolio</div><div style="font-size:18px;font-weight:700;color:#EF9F27;font-family:'Syne',sans-serif">${ldgFmtK(totalActual)}</div></div>
    ${totalPlanned>0 ? `<div style="text-align:right"><div style="font-size:10px;color:var(--muted)">Plan target</div><div style="font-size:12px;color:var(--text)">${ldgFmtK(totalPlanned)}</div></div>` : ''}
  </div>
  </div>`;

  // Upcoming purchases
  if (upcoming.length > 0) {
    h += `<div class="ldg-card"><div class="ldg-card-title">Next Purchases</div>`;
    upcoming.forEach(p => {
      const per = PLAN_PERIODS.find(pp => pp.id === p.periodId);
      h += `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:18px">${p.emoji}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;color:var(--text)">${p.name}</div>
          <div style="font-size:10px;color:var(--muted)">${per?ldgFmtDate(per.date):''}${p.detail?' · '+p.detail:''}</div>
        </div>
        <div style="font-size:12px;color:#EF9F27;font-weight:600">${ldgFmtK(p.amount)}</div>
      </div>`;
    });
    h += `</div>`;
  }

  h += `</div>`;
  return h;
}

function ldgTimeline(now, pastPeriods, overdue, nextPeriod) {
  let h = `<div style="padding:0.5rem 1rem 0.25rem;display:flex;flex-wrap:wrap;gap:8px;">`;
  [{color:'#1D9E75',lbl:'Paid'},{color:'#EF9F27',lbl:'Next'},{color:'#E24B4A',lbl:'Overdue'},{color:'var(--dim)',lbl:'Future'}].forEach(l => {
    h += `<span style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)"><span style="width:7px;height:7px;border-radius:50%;background:${l.color};display:inline-block"></span>${l.lbl}</span>`;
  });
  h += `</div>`;

  let phase1Shown = false, phase2Shown = false;

  PLAN_PERIODS.forEach((period, idx) => {
    const date      = new Date(period.date);
    const isPast    = date <= now;
    const isPaid    = !!ldgState.paidPeriods[period.id];
    const isNext    = !isPast && (idx===0 || new Date(PLAN_PERIODS[idx-1].date)<=now);
    const isOverdue = isPast && !isPaid;
    const periodPurchases = PURCHASES.filter(p => p.periodId === period.id);
    const isOpen    = ldgExpandedPeriod === period.id;

    let dotColor = 'var(--dim)';
    if (isPaid)      dotColor = '#1D9E75';
    else if (isOverdue) dotColor = '#E24B4A';
    else if (isNext)    dotColor = '#EF9F27';

    if (period.phase===1 && !phase1Shown) {
      phase1Shown = true;
      h += `<div style="padding:0.6rem 1rem 0.1rem;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)">Phase 1 — 2026 · Infrastructure &amp; Rebirth</div>`;
    }
    if (period.phase===2 && !phase2Shown) {
      phase2Shown = true;
      h += `<div style="padding:0.6rem 1rem 0.1rem;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)">Phase 2 — 2027 · The Car &amp; Rent Strategy</div>`;
    }

    h += `<div class="ldg-period" onclick="ldgTogglePeriod(${period.id})" style="${isNext?'border-left:2px solid #EF9F27':isOverdue?'border-left:2px solid #E24B4A':'border-left:2px solid transparent'}">
      <div class="ldg-period-hdr">
        <div class="ldg-period-dot" style="background:${dotColor}"></div>
        <div class="ldg-period-date">${date.toLocaleDateString('en-NG',{month:'short',day:'numeric',year:'numeric'})}</div>
        ${period.note ? `<div class="ldg-period-note">${period.note}</div>` : '<div style="flex:1"></div>'}
        ${periodPurchases.map(p=>`<span title="${p.name}">${p.emoji}</span>`).join('')}
        <div class="ldg-period-amt">Goal ${ldgFmtK(period.goal)}</div>
        <span style="font-size:9px;color:var(--muted);margin-left:4px">${isOpen?'▲':'▼'}</span>
      </div>`;

    if (isOpen) {
      h += `<div style="padding-top:8px;padding-left:15px">
        <div class="ldg-grid3">
          <div class="ldg-mini"><div class="ldg-mini-lbl">Savings</div><div class="ldg-mini-val" style="color:#1D9E75">${ldgFmtK(period.savings)}</div></div>
          <div class="ldg-mini"><div class="ldg-mini-lbl">Land/Stocks</div><div class="ldg-mini-val" style="color:#378ADD">${ldgFmtK(period.land)}</div></div>
          <div class="ldg-mini"><div class="ldg-mini-lbl">Goal Fund</div><div class="ldg-mini-val" style="color:#EF9F27">${ldgFmtK(period.goal)}</div></div>
        </div>`;

      if (periodPurchases.length > 0) {
        periodPurchases.forEach(p => {
          h += `<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px">
            <span>${p.emoji}</span><span style="flex:1;color:var(--text)">${p.name}</span><span style="color:#EF9F27;font-weight:600">${ldgFmtK(p.amount)}</span>
          </div>`;
        });
      }

      if (isPaid) {
        const pd = ldgState.paidPeriods[period.id];
        h += `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding:6px 8px;background:#051a10;border:1px solid #0d3020;border-radius:4px">
          <div>
            <div style="font-size:11px;color:#1D9E75;font-weight:600">✓ Paid</div>
            <div style="font-size:10px;color:var(--muted)">${ldgFmt(pd.actualAmount)} · ${ldgFmtDate(pd.paidDate)}${pd.notes?' · '+pd.notes:''}</div>
          </div>
          <button onclick="ldgUnmarkPaid(${period.id})" style="background:none;border:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer">Undo</button>
        </div>`;
      } else {
        if (ldgMarkOpen === period.id) {
          h += `<div style="margin-top:6px">
            <input id="ldg-pay-amt-${period.id}" class="ldg-input" type="number" value="${INCOME.gross}" style="margin-bottom:6px" placeholder="Amount received">
            <input id="ldg-pay-notes-${period.id}" class="ldg-input" type="text" placeholder="Notes (optional)" style="margin-bottom:6px">
            <div style="display:flex;gap:6px">
              <button onclick="ldgOpenMark(${period.id})" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:4px;font-family:'DM Mono',monospace;font-size:10px;padding:7px;cursor:pointer;color:var(--muted)">Cancel</button>
              <button onclick="ldgMarkPaid(${period.id})" style="flex:1;background:#1D9E75;border:none;border-radius:4px;font-family:'DM Mono',monospace;font-size:10px;padding:7px;cursor:pointer;color:#fff;font-weight:600">Confirm ✓</button>
            </div>
          </div>`;
        } else {
          h += `<div style="display:flex;gap:6px;margin-top:6px">
            <button onclick="ldgOpenMark(${period.id})" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:4px;font-family:'DM Mono',monospace;font-size:10px;padding:7px;cursor:pointer;color:var(--muted)">Mark Paid</button>
          </div>`;
        }
      }
      h += `</div>`;
    }
    h += `</div>`;
  });

  return h;
}

function ldgBudget() {
  const monthlyUpkeep = INCOME.upkeep * 2;
  const totalSubs     = MONTHLY_EXPENSES.reduce((s,e)=>s+e.amount,0);
  const foodMisc      = monthlyUpkeep - totalSubs;
  const allItems      = [...MONTHLY_EXPENSES, {name:'Food & Misc',amount:foodMisc,color:'#475569'}];
  const totalAll      = allItems.reduce((s,e)=>s+e.amount,0);

  let h = `<div class="ldg-section">`;

  // Stacked bar
  h += `<div class="ldg-card">
    <div class="ldg-card-title">Monthly Expense Breakdown</div>
    <div class="ldg-stacked-bar">`;
  allItems.forEach(e => {
    h += `<div style="flex:${(e.amount/totalAll)*100};background:${e.color}" title="${e.name}: ${ldgFmt(e.amount)}"></div>`;
  });
  h += `</div>`;
  allItems.forEach(e => {
    h += `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
      <div style="width:10px;height:10px;border-radius:2px;background:${e.color};flex-shrink:0"></div>
      <span style="font-size:11px;flex:1;color:var(--muted)">${e.name}</span>
      <span style="font-size:12px;color:var(--text);font-weight:500">${ldgFmt(e.amount)}</span>
      <span style="font-size:10px;color:var(--dim);width:30px;text-align:right">${Math.round((e.amount/totalAll)*100)}%</span>
    </div>`;
  });
  h += `<div style="padding-top:0.5rem;margin-top:0.25rem">
    <div class="ldg-row"><span class="ldg-row-lbl">Monthly Upkeep (₦75k×2)</span><span class="ldg-row-val">${ldgFmt(monthlyUpkeep)}</span></div>
    <div class="ldg-row"><span class="ldg-row-lbl">Fixed Subscriptions</span><span class="ldg-row-val">${ldgFmt(totalSubs)}</span></div>
    <div class="ldg-row"><span class="ldg-row-lbl" style="color:var(--text);font-weight:600">Food &amp; Misc Buffer</span><span style="color:#1D9E75;font-weight:700;font-size:13px">${ldgFmt(foodMisc)}</span></div>
  </div>
  </div>`;

  // Cash flow
  h += `<div class="ldg-card">
    <div class="ldg-card-title">Biweekly Cash Flow</div>`;
  [
    {lbl:'Gross Income',    val:INCOME.gross,  sign:'',  c:'var(--text)'},
    {lbl:'Tithe (10%)',     val:INCOME.tithe,  sign:'−', c:'#E24B4A'},
    {lbl:'Biweekly Upkeep',val:INCOME.upkeep, sign:'−', c:'#f59e0b'},
    {lbl:'Net to Allocate', val:INCOME.net,    sign:'=', c:'#1D9E75'},
  ].forEach(item => {
    h += `<div class="ldg-row">
      <span class="ldg-row-lbl">${item.lbl}</span>
      <span style="font-size:12px;font-weight:600;color:${item.c}">${item.sign} ${ldgFmt(item.val)}</span>
    </div>`;
  });
  h += `</div>`;

  // Split
  h += `<div class="ldg-card">
    <div class="ldg-card-title">Allocation Split (from Aug 7, 2026)</div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:8px">Before Aug 7 → 100% to Goal Fund</div>
    <div class="ldg-grid3">
      <div class="ldg-mini" style="border-color:#1D9E75"><div class="ldg-mini-lbl">Savings (POF)</div><div class="ldg-mini-val" style="color:#1D9E75">${ldgFmtK(180000)}</div><div style="font-size:9px;color:var(--muted)">35%</div></div>
      <div class="ldg-mini" style="border-color:#378ADD"><div class="ldg-mini-lbl">Land &amp; Stocks</div><div class="ldg-mini-val" style="color:#378ADD">${ldgFmtK(80000)}</div><div style="font-size:9px;color:var(--muted)">16%</div></div>
      <div class="ldg-mini" style="border-color:#EF9F27"><div class="ldg-mini-lbl">Goal Fund</div><div class="ldg-mini-val" style="color:#EF9F27">${ldgFmtK(250000)}</div><div style="font-size:9px;color:var(--muted)">49%</div></div>
    </div>
  </div>`;

  h += `</div>`;
  return h;
}

function ldgPurchases(now) {
  const done  = PURCHASES.filter(p => ldgState.purchasesDone[p.id]).length;
  const spent = PURCHASES.filter(p => ldgState.purchasesDone[p.id])
    .reduce((s,p) => s + (ldgState.purchasesDone[p.id].actualCost || p.amount), 0);

  let h = `<div class="ldg-section">
    <div class="ldg-grid3">
      <div class="ldg-mini"><div class="ldg-mini-lbl">Total</div><div class="ldg-mini-val">${PURCHASES.length}</div></div>
      <div class="ldg-mini"><div class="ldg-mini-lbl">Done</div><div class="ldg-mini-val" style="color:#1D9E75">${done}</div></div>
      <div class="ldg-mini"><div class="ldg-mini-lbl">Spent</div><div class="ldg-mini-val" style="color:#EF9F27">${ldgFmtK(spent)}</div></div>
    </div>
  </div>`;

  PURCHASES.forEach(p => {
    const per    = PLAN_PERIODS.find(pp => pp.id === p.periodId);
    const isDone = !!ldgState.purchasesDone[p.id];
    const doneData = ldgState.purchasesDone[p.id];

    h += `<div class="ldg-purchase ${isDone?'done':''}">
      <div class="ldg-chk ${isDone?'done':''}" onclick="isDone?ldgUnmarkDone('${p.id}'):ldgOpenBuy('${p.id}')">
        ${isDone?chkSVG('#0C0C0E'):''}
      </div>
      <span class="ldg-purchase-emoji">${p.emoji}</span>
      <div class="ldg-purchase-info">
        <div class="ldg-purchase-name ${isDone?'done':''}">${p.name}${isDone?'<span class="ldg-badge-ok">Purchased ✓</span>':''}</div>
        <div class="ldg-purchase-sub">${p.detail?p.detail+' · ':''}${per?per.date.slice(0,7):''}
          ${isDone&&doneData?`<br>Paid ${ldgFmt(doneData.actualCost||p.amount)} on ${ldgFmtDate(doneData.doneDate)}`:''}
        </div>
        ${!isDone && ldgBuyOpen===p.id ? `
          <div onclick="event.stopPropagation()" style="margin-top:6px">
            <input id="ldg-buy-amt-${p.id}" class="ldg-input" type="number" value="${p.amount}" style="margin-bottom:5px">
            <div style="display:flex;gap:5px">
              <button onclick="ldgOpenBuy('${p.id}')" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:3px;font-family:'DM Mono',monospace;font-size:10px;padding:6px;cursor:pointer;color:var(--muted)">Cancel</button>
              <button onclick="ldgMarkDone('${p.id}')" style="flex:1;background:#1D9E75;border:none;border-radius:3px;font-family:'DM Mono',monospace;font-size:10px;padding:6px;cursor:pointer;color:#fff;font-weight:600">Confirm ✓</button>
            </div>
          </div>` : ''}
        ${isDone ? `<div onclick="event.stopPropagation()"><button onclick="ldgUnmarkDone('${p.id}')" style="background:none;border:none;color:var(--dim);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;padding:0;margin-top:2px">Undo</button></div>` : ''}
        ${!isDone && ldgBuyOpen!==p.id ? `<button onclick="ldgOpenBuy('${p.id}')" style="display:block;width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:3px;font-family:'DM Mono',monospace;font-size:10px;padding:5px;cursor:pointer;color:var(--muted);text-align:center;margin-top:5px">Mark as Purchased</button>` : ''}
      </div>
      <div class="ldg-purchase-amt">${ldgFmtK(p.amount)}</div>
    </div>`;
  });

  return h;
}

// ─── INIT ────────────────────────────────────────────────────────────────────

const renders = {schedule:renderSchedule, youtube:renderYouTube, academia:renderAcademia, ai:renderAI, overview:renderOverview, ledger:renderLedger};

renderHdr();
renderSchedule();
</script>
